<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Center</title>
    <style>
        * { font-family: helvetica; line-height: 1.5; margin: 0; }
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        a { text-decoration: none; color: black; }
        a:hover { text-decoration: underline; color: blue; }
        .challengeLink {
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            margin: 5px 0;
            font-size: 14px;
            background-color: lightgrey;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 2px 2px 5px black;
            width: 100px;
        }
        footer { margin-top: auto; padding: 20px; }
    </style>
</head>
<body>
<nav style="display:flex; justify-content:center; align-items:center; width:100%;">
    <div style="margin:0 10px; width:120px; display:flex; align-items:center;">
        <b><a href="/">VulnaRebel</a></b>
    </div>
    <ul style="display:flex; align-items:center; width:100%;
                   min-height:40px; list-style:none;">
        <li><a href="/">Challenges</a></li>
    </ul>
</nav>
<h1>Welcome to the Resources Center</h1>
<h2>This is the place where your knowledge starts to form...</h2>
<div style="display:flex; flex-wrap:wrap; justify-content:center; padding:10px;">
    {{cards}}
</div>
<footer>
    <p>Made with love ❤</p>
</footer>
</body>
</html>
