article.title=Reflected Xss
article.subtitle=Learn what Reflected Xss is, how it works, how to exploit it and how to prevent it.

article.introduction.title=What is Reflected Xss?
article.introduction.text=<strong>Cross-Site Scripting</strong> (XSS) is a client-side \
  injection vulnerability where an attacker injects malicious JavaScript \
  into a web page viewed by other users. In the reflected variant, \
  the malicious script is part of the HTTP request - typically a URL \
  parameter or form field - and is immediately reflected back in \
  the server's response without being stored. <br>Unlike stored XSS, \
  the payload must be delivered to the victim directly, usually via \
  a crafted link. Despite this, reflected XSS remains one of the most \
  common vulnerabilities in web applications.

article.mechanism.title=How does it work?
article.mechanism.text=A vulnerable application takes user input and \
  includes it directly in the HTML response without encoding it. \
  For example, a search page that returns: <br>\
  `You searched for: [user input]` <br>\
  If the application does not encode the input, submitting the value \
  `<script>alert(1)</script>` causes the browser to render: <br>\
  `You searched for: <script>alert(1)</script>`. <br>\
  The browser cannot distinguish between the application's own scripts \
  and the injected one - both are in the same HTML document, \
  so both execute with the same privileges. This is the \
  same-origin policy working against the user.

article.exploitation.title=How can it be exploited?
article.exploitation.text=The simplest payload confirms the vulnerability: <br>\
  `<script>alert(document.cookie)</script>`.<br> \
  In real attacks, the script exfiltrates the victim's session cookie \
  to an attacker-controlled server, allowing session hijacking. \
  Other payloads redirect the victim to a phishing page, \
  perform actions on their behalf (CSRF via XSS), \
  or log every keystroke. The payload is delivered by tricking the \
  victim into clicking a crafted URL: <br>\
  `https://vulnerable-site.com/search?q=<script>...</script>`. \
  Modern browsers and WAFs may block obvious script tags - \
  attackers use alternative vectors such as event handlers:<br> \
  `<img src=x onerror=alert(1)>` or SVG-based payloads \
  to bypass naive filters.

article.defense.title=How can it be prevented?
article.defense.text=The primary defense is output encoding - \
  every piece of user-supplied data inserted into HTML must be \
  encoded so that special characters cannot be interpreted as markup. <br>\
  The character `<` becomes `&lt;`, `>` becomes `&gt;`, \
  and `"` becomes `&quot;`. This ensures that even if a player submits \
  `<script>alert(1)</script>`, the browser renders it as literal text \
  rather than executing it. In Java, libraries such as OWASP Java \
  Encoder provide context-aware encoding for HTML, JavaScript, \
  CSS, and URL contexts. A Content Security Policy (CSP) header \
  provides an additional layer by whitelisting which scripts \
  the browser is permitted to execute, blocking inline scripts \
  even if injection succeeds. Never attempt to filter or blacklist \
  specific tags - attackers have hundreds of bypass techniques \
  for blocklist-based approaches.

