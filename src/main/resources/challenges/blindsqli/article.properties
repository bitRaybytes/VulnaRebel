article.title=Blind SQL Injection
article.subtitle=Learn what Blind SQL Injection is, how it works, how to exploit it and how to prevent it.

article.introduction.title=What is Blind SQL Injection?
article.introduction.text=<strong>Blind SQL Injection</strong> is a variant of SQL Injection \
  where the application does not return query results or error messages \
  directly to the attacker. The vulnerability is identical to classic SQLi \
  - unsanitized input reaches the database - but the attacker receives \
  no visible data in return. Instead, they must infer information from \
  the application's binary responses: does the page say <strong>"found"</strong> or <strong>"not </strong>found", \
  does it respond quickly or slowly. This makes exploitation significantly \
  harder but not impossible.

article.mechanism.title=How does it work?
article.mechanism.text=A blind SQLi query exploits the fact that a SQL `WHERE` \
  clause evaluates to true or false. The attacker appends an `AND` condition \
  that asks a yes-or-no question about the database content. <br>\
  For example: `admin' AND SUBSTRING(secret, 1, 1)='c' --`. <br>\
  If the application responds "User found", the first character of the \
  secret column is '`c`'. If it responds "User not found", it is not. <br>\
  By repeating this process for every character position and every \
  possible character value, the attacker extracts the entire secret \
  one bit at a time. `SUBSTRING(column, position, length)` is the \
  key PostgreSQL function enabling this technique.

article.exploitation.title=How can it be exploited?
article.exploitation.text=Boolean-based blind injection is the foundational \
  technique: craft a payload that makes the query true or false depending \
  on a condition, then observe the response. For each character position, \
  iterate through possible values until the application confirms a match. \
  Time-based blind injection is used when even the true/false signal is \
  hidden - the payload causes the database to sleep for a measurable \
  period if the condition is true: <br>\
  `admin' AND pg_sleep(5) --`. \
  A five-second delay confirms the condition. Tools like sqlmap automate \
  both techniques, but manual exploitation using `SUBSTRING` payloads \
  builds the deeper understanding of what is actually happening \
  at the database level.


article.defense.title=How can it be prevented?
article.defense.text=Prevention is identical to classic SQL Injection: \
  use parameterized queries exclusively. Since the vulnerability exists \
  in how the query is constructed, no amount of output filtering prevents \
  it - the injection happens before any result is returned. <br>\
  `PreparedStatement` with bound parameters makes it structurally impossible \
  for user input to alter the query's logic, regardless of what the \
  input contains. Additionally, limit the privileges of the database \
  account used by the application - a read-only account on a single \
  table cannot be used to extract data from other tables even if \
  injection is successful.

