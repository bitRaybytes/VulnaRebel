article.title=Reconnaissance
article.subtitle=The most powerful tool in offensive security \
  is already built into your browser.

article.introduction.title=What is Reconnaissance?
article.introduction.text=Reconnaissance is the process of gathering \
  information about a target before attempting exploitation.<br> \
  In web security, passive reconnaissance requires no interaction \
  with the server beyond what a normal user would do. <br><br>\
  Reading page source, inspecting HTTP headers, reviewing \
  publicly available files like `robots.txt` or `README.md` - \
  these actions reveal what developers left behind unintentionally. \
  Credentials, internal paths, commented-out debug code, \
  and API keys appear in production systems with surprising regularity.

article.mechanism.title=Why do developers leave things behind?
article.mechanism.text=Development moves fast. A comment added \
  during debugging, a hardcoded credential used for local testing, \
  a TODO note that never got resolved - these accumulate across \
  a codebase and frequently survive into production deployments.<br><br> \
  Version control history compounds the problem: even if a secret \
  is removed from the current file, it remains accessible in \
  `git log` unless the history is explicitly rewritten.<br><br>\
  The 2021 Twitch breach exposed source code that contained \
  hardcoded credentials. The 2019 Capital One breach involved \
  metadata accessible via a misconfigured endpoint - \
  information the attacker read before any exploitation began.

article.exploitation.title=How is it used in practice?
article.exploitation.text=A security engineer approaching a web \
  application starts with passive observation before active probing. \
  Open DevTools (`F12`), navigate to the Elements or Sources tab, \
  and read the full HTML source. Look for HTML comments (`<!-- -->`), \
  inline JavaScript variables, hidden form fields, and links \
  to internal endpoints. Check `robots.txt` for disallowed paths - \
  these often reveal admin panels and internal tools. <br><br>\
  Read `README.md` and any publicly accessible documentation. \
  Inspect HTTP response headers for server version information, \
  framework identifiers, and custom headers. Tools like \
  `curl -I https://target.com` surface headers without \
  loading a browser. Nothing found this way requires a single \
  malicious request - it is entirely passive.

article.defense.title=How can exposure be prevented?
article.defense.text=Remove all comments from production HTML - \
  build pipelines should strip them automatically.<br><br> \
  Never hardcode credentials in source files - use environment \
  variables or secret management services. <br><br>\
  Audit `git log` before making a repository public - \
  tools like `truffleHog` and `git-secrets` scan history \
  for accidentally committed secrets. <br><br>\
  Review `robots.txt` carefully - listing sensitive paths \
  there effectively advertises them to attackers. <br><br>\
  Add secret scanning to your CI pipeline so hardcoded \
  credentials are caught before they reach production.

