# Article related
article.title=SQL Injection
article.subtitle=Learn what SQL Injection is, how it works, how to exploit it and how to prevent it.

article.introduction.title=What is SQL Injection?
article.introduction.text=<strong>SQL Injection</strong> (SQLi) is a web security vulnerability \
  that allows an attacker to interfere with the queries an application makes \
  to its database. It occurs when user-supplied input is incorporated directly \
  into a SQL query without proper sanitization or escaping. \
  First documented in 1998, it remains one of the most critical and \
  widespread vulnerabilities in web applications today.

article.mechanism.title=How does it work?
article.mechanism.text=A typical login query looks like this: \
  `SELECT * FROM users WHERE username = 'input' AND password = 'input'`. \
  When an application builds this query using string concatenation, \
  an attacker can inject SQL syntax directly into the input fields. \
  For example, entering the value: `' OR '1'='1` as the password \
  transforms the query into: `SELECT * FROM users WHERE username = 'admin' \
  AND password = '' OR '1'='1'`. \
  Since `'1'='1'` is always true, the entire `WHERE` clause evaluates to true \
  and the query returns all rows - granting unauthorized access.

article.exploitation.title=How can it be exploited?
article.exploitation.text=The most basic exploitation technique uses boolean \
  conditions such as `' OR '1'='1` to bypass authentication. \
  More advanced techniques include UNION-based injection, which appends \
  a second SELECT statement to extract data from other tables: \
  `' UNION SELECT username, password FROM users --`.<br> \
  Error-based injection extracts data through deliberately triggered \
  database error messages. Stacked queries (where supported) allow \
  executing multiple statements separated by semicolons, enabling \
  `INSERT`, `UPDATE`, or `DROP` operations. In PostgreSQL, stacked queries \
  require the `allowMultiQueries` flag to be enabled on the connection.

article.defense.title=How can it be prevented?
article.defense.text=The primary defense against SQL Injection is the use of \
  parameterized queries - also called prepared statements. Instead of \
  concatenating user input into the SQL string, the query is defined with \
  placeholders and values are bound separately: \
  `PreparedStatement stmt = conn.prepareStatement( \
  "SELECT * FROM users WHERE username = ? AND password = ?")`. <br>\
  The database driver handles escaping automatically, making injection \
  impossible. Additional defenses include input validation, \
  least-privilege database accounts, and web application firewalls. \
  Parameterized queries alone are sufficient to prevent SQLi entirely \
  - the other measures are defense in depth.

